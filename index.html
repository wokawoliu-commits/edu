<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>北京教育调研导航</title>
  <link rel="icon" href="image/favicon.svg">
  <style>
    :root {
      --ink: #17201b;
      --muted: #66726b;
      --line: #dfe5df;
      --paper: #f7f6f0;
      --surface: #fffdf8;
      --accent: #0f766e;
      --warm: #a35c1b;
      --plum: #7a3f63;
      --soft: #eef3ed;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(247, 246, 240, .95), rgba(247, 246, 240, 1)),
        repeating-linear-gradient(90deg, rgba(15, 118, 110, .055) 0 1px, transparent 1px 80px);
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      padding: 58px 0 26px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .kicker::before {
      content: "";
      width: 34px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      margin: 18px 0 16px;
      max-width: 860px;
      font-size: clamp(42px, 7vw, 88px);
      line-height: .98;
      letter-spacing: 0;
    }

    .lead {
      max-width: 720px;
      margin: 0;
      color: #38463f;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.65;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      margin-top: 38px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .metric {
      min-height: 100px;
      padding: 20px 22px;
      background: rgba(255, 253, 248, .84);
    }

    .metric strong {
      display: block;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      padding: 34px 0 64px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 150px 150px;
      gap: 10px;
      padding: 12px 0;
      background: rgba(247, 246, 240, .92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(223, 229, 223, .76);
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 0 12px;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      outline-color: var(--accent);
    }

    .directory {
      margin-top: 18px;
      border-top: 1px solid var(--line);
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) 150px 150px 128px;
      gap: 18px;
      align-items: center;
      min-height: 112px;
      padding: 20px 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      transition: background .16s ease, transform .16s ease;
    }

    .row:hover {
      background: rgba(255, 253, 248, .68);
      transform: translateX(4px);
    }

    .title {
      display: block;
      margin-bottom: 8px;
      font-size: clamp(19px, 2.4vw, 28px);
      line-height: 1.2;
      font-weight: 850;
    }

    .desc {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      min-height: 30px;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: #30423a;
      font-size: 13px;
      font-weight: 760;
      white-space: nowrap;
    }

    .tag.source {
      background: rgba(15, 118, 110, .12);
      color: #0d5f59;
    }

    .tag.topic {
      background: rgba(122, 63, 99, .12);
      color: var(--plum);
    }

    .open {
      display: inline-flex;
      justify-content: flex-end;
      color: var(--warm);
      font-weight: 850;
      font-size: 14px;
    }

    .empty {
      display: none;
      padding: 42px 0;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      .shell {
        width: min(100% - 28px, 1160px);
      }

      header {
        padding-top: 42px;
      }

      .summary,
      .toolbar,
      .row {
        grid-template-columns: 1fr;
      }

      .toolbar {
        position: static;
      }

      .row {
        gap: 10px;
        align-items: start;
      }

      .open {
        justify-content: flex-start;
      }

      .footer {
        display: block;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <div class="kicker">EDU RESEARCH INDEX</div>
      <h1>北京教育调研导航</h1>
      <p class="lead">集中访问已整理的学区、学校和平台讨论报告，按城区、来源和主题快速定位。</p>
      <div class="summary" id="summary"></div>
    </div>
  </header>

  <main>
    <div class="shell">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="搜索：东城 / 西城 / 微博 / 知乎 / 小红书">
        <select id="districtSelect">
          <option value="">全部城区</option>
        </select>
        <select id="sourceSelect">
          <option value="">全部来源</option>
        </select>
      </div>

      <nav class="directory" id="directory" aria-label="调研页面导航"></nav>
      <div class="empty" id="empty">没有匹配的页面。</div>

      <div class="footer">
        <span id="resultCount"></span>
        <span>静态导航页 · 所有链接使用相对路径</span>
      </div>
    </div>
  </main>

  <script>
    const pages = [
      {
        title: '北京朝阳区小学学区：知乎讨论汇总',
        path: 'chaoyang_zhihu/',
        district: '朝阳',
        source: '知乎',
        topic: '小学学区',
        description: '朝阳区小学与学区相关问答讨论整理。'
      },
      {
        title: '北京民办学校小红书口碑摘要',
        path: 'dc_xhs/',
        district: '北京',
        source: '小红书',
        topic: '民办学校',
        description: '小红书平台上的北京民办学校口碑与家长反馈摘要。'
      },
      {
        title: '北京市东城区学校微博调研报告',
        path: 'dongcheng_weibo/',
        district: '东城',
        source: '微博',
        topic: '学校学区',
        description: '东城区学校、学区房、派位和升学路径的微博讨论报告。'
      },
      {
        title: '北京东城区学校/学区：知乎讨论汇总',
        path: 'dongcheng_zhihu/',
        district: '东城',
        source: '知乎',
        topic: '学校学区',
        description: '东城区学校与学区相关知乎问答讨论整理。'
      },
      {
        title: '北京市西城区学校微博调研报告',
        path: 'xc_weibo/',
        district: '西城',
        source: '微博',
        topic: '学校学区',
        description: '西城区学校、学区房、派位、小升初和中考路径的微博讨论报告。'
      },
      {
        title: '北京西城区小学学区：知乎讨论汇总',
        path: 'xc_zhichu/',
        district: '西城',
        source: '知乎',
        topic: '小学学区',
        description: '西城区小学与学区相关知乎问答讨论整理。'
      }
    ];

    const searchInput = document.getElementById('searchInput');
    const districtSelect = document.getElementById('districtSelect');
    const sourceSelect = document.getElementById('sourceSelect');
    const directory = document.getElementById('directory');
    const empty = document.getElementById('empty');
    const resultCount = document.getElementById('resultCount');
    const summary = document.getElementById('summary');

    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));

    function fillFilters() {
      const districts = [...new Set(pages.map(page => page.district))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
      const sources = [...new Set(pages.map(page => page.source))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
      districtSelect.innerHTML += districts.map(item => `<option value="${esc(item)}">${esc(item)}</option>`).join('');
      sourceSelect.innerHTML += sources.map(item => `<option value="${esc(item)}">${esc(item)}</option>`).join('');
    }

    function renderSummary() {
      const districts = new Set(pages.map(page => page.district)).size;
      const sources = new Set(pages.map(page => page.source)).size;
      const topics = new Set(pages.map(page => page.topic)).size;
      const metrics = [
        ['页面', pages.length],
        ['城区', districts],
        ['来源', sources],
        ['主题', topics]
      ];
      summary.innerHTML = metrics.map(([label, value]) => `
        <div class="metric">
          <strong>${value}</strong>
          <span>${esc(label)}</span>
        </div>
      `).join('');
    }

    function filteredPages() {
      const query = searchInput.value.trim().toLowerCase();
      const district = districtSelect.value;
      const source = sourceSelect.value;
      return pages.filter(page => {
        const haystack = [page.title, page.path, page.district, page.source, page.topic, page.description].join(' ').toLowerCase();
        return (!query || haystack.includes(query))
          && (!district || page.district === district)
          && (!source || page.source === source);
      });
    }

    function renderDirectory() {
      const rows = filteredPages();
      empty.style.display = rows.length ? 'none' : 'block';
      resultCount.textContent = `当前显示 ${rows.length} / ${pages.length} 个页面`;
      directory.innerHTML = rows.map(page => `
        <a class="row" href="${esc(page.path)}">
          <span>
            <span class="title">${esc(page.title)}</span>
            <p class="desc">${esc(page.description)}</p>
          </span>
          <span class="tag">${esc(page.district)}</span>
          <span class="tag source">${esc(page.source)}</span>
          <span class="open">打开</span>
        </a>
      `).join('');
    }

    fillFilters();
    renderSummary();
    renderDirectory();
    [searchInput, districtSelect, sourceSelect].forEach(element => {
      element.addEventListener('input', renderDirectory);
    });
  </script>
</body>
</html>
